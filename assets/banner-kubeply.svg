<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kubeply</title>
  <desc id="desc">Kubeply helps teams maintain complex infrastructure faster and with fewer production mistakes.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1724"/>
      <stop offset="1" stop-color="#071b1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="213" x2="1104" y2="213" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#5eead4"/>
      <stop offset="0.78" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" rx="14" fill="url(#background)"/>
  <rect width="1200" height="260" rx="14" fill="url(#grid)"/>

  <text x="96" y="112" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="750">Kubeply</text>
  <text x="100" y="158" fill="#99f6e4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="650">Measure infra work. Fix what hurts.</text>

  <rect x="96" y="212" width="1008" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
